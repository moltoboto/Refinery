<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refinery V2.57</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f5f4f0;
  --surface:     #ffffff;
  --surface2:    #faf9f6;
  --border:      #e4e2db;
  --border2:     #d0cec6;
  --accent:      #cc4b00;
  --accent-soft: #fdf1eb;
  --accent2:     #1a6b3c;
  --text:        #1c1b18;
  --text2:       #4a4840;
  --muted:       #8c8a84;
  --muted2:      #b8b5ae;
  --unread-dot:  #cc4b00;
  --kept:        #1a6b3c;
  --sidebar-w:   200px;
  --list-w:      360px;
  --header-h:    56px;
  --kb-h:        40px;
  --shadow-sm:   0 1px 3px rgba(0,0,0,0.07);
  --shadow-md:   0 4px 12px rgba(0,0,0,0.08);
  --radius:      6px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}
.app { display: flex; flex-direction: column; height: 100vh; }

header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px 0 20px;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  z-index: 20;
}

.logo {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 20px;
  color: var(--accent);
  letter-spacing: -0.3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 14px;
  flex-shrink: 0;
}

.search-box {
  flex: 1;
  max-width: 400px;
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(204,75,0,0.08);
}

.search-box input::placeholder { color: var(--muted2); }
.search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); width:18px; height:18px; border:none; background:none; color:var(--muted); cursor:pointer; font-size:14px; display:none; line-height:18px; }
.search-clear:hover { color: var(--accent); }
.more-btn { color: var(--accent); }

.search-icon {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 13px;
  pointer-events: none;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
  row-gap: 6px;
}

/* Narrow screens (phones): same layout, just tuned. Header reflows to vertical
   stack so chips reach. Sidebar and the reading-off right gutter both shrink
   automatically because the gutter uses var(--sidebar-w). */
@media (max-width: 720px) {
  :root { --sidebar-w: 110px; --list-w: 240px; }
  header {
    height: auto;
    flex-wrap: wrap;
    padding: 8px 12px;
    gap: 8px;
  }
  .logo { font-size: 16px; }
  .search-box { flex: 1 1 100%; max-width: none; order: 3; }
  .header-right {
    margin-left: 0;
    flex: 1 1 100%;
    justify-content: flex-start;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .chip { padding: 4px 9px; font-size: 11.5px; flex-shrink: 0; }
  .status-badge { font-size: 11px; flex-shrink: 0; }
}

.chip {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.chip svg { vertical-align: middle; display: inline-block; }
.nav-icon svg { vertical-align: middle; display: inline-block; }

.status-badge {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 4px;
}

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted2);
  flex-shrink: 0;
}
.live-dot.connected { background: #22c55e; animation: blink 2.5s infinite; }
.live-dot.error { background: #ef4444; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
.body-wrap {
  display: flex;
  flex: 1;
  overflow: hidden;
}
aside {
  width: var(--sidebar-w);
  background: var(--surface2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding-bottom: 16px;
}

.sidebar-section {
  padding: 10px 12px 2px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  cursor: pointer;
  font-size: 13.5px;
  color: var(--text2);
  font-weight: 400;
  border-radius: 0;
  transition: background 0.1s, color 0.1s;
  border-left: 2px solid transparent;
  user-select: none;
}

.nav-item:hover { background: var(--accent-soft); color: var(--text); }

.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 600;
  border-left-color: var(--accent);
}

/* Category nav glyphs are hidden in the normal full-width nav. v2.48 retired the
   iconized-rail nav mode (folded into the single Focus toggle), so the glyph is
   never shown; the rule is kept so catIcoSvg_ output stays inert in the sidebar. */
.nav-icon { display: none; }

/* No flex:1 — let label take its natural width so the count badge sits
   right next to it instead of being pushed to the far right edge. The space
   to the right of the count is fine; the gap BETWEEN label and count was
   the visual problem. */
.nav-label { flex: 0 0 auto; }

.nav-count {
  font-size: 11px;
  font-weight: 600;
  background: var(--accent);
  color: white;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

.nav-count.zero { background: var(--border); color: var(--muted); font-weight: 400; }

.sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
.list-pane {
  width: var(--list-w);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  background: var(--surface);
  display: flex;
  flex-direction: column;
}

.list-header {
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 5;
}

.list-title {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
}

.list-meta {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.mark-all-btn {
  font-size: 11px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  padding: 2px 0;
  transition: color 0.15s;
}
.mark-all-btn:hover { color: var(--accent); }

.summarize-btn {
  font-size: 11px;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  padding: 2px 0;
  transition: color 0.15s;
}
.summarize-btn:hover { color: var(--text); }

.summary-copy-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  padding: 10px 14px;
  background: var(--accent-soft);
  border: 1px solid #f0d9c0;
  border-radius: var(--radius);
}

.summary-copy-bar .copy-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid var(--accent);
  background: var(--accent);
  color: white;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.summary-copy-bar .copy-btn:hover { opacity: 0.85; }

.summary-copy-bar .copy-label {
  font-size: 12px;
  color: var(--text2);
  flex: 1;
}

.summary-prompt {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-family: 'DM Sans', monospace;
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--text2);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: none;
  overflow: visible;
}

.card {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}

.card:hover { background: #fafaf8; }
.card.selected { background: var(--accent-soft); }
.card.read { opacity: 0.6; }

.card-eyebrow {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 5px;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.card-source-label { color: var(--accent); }

.card-title {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 14px;
  line-height: 1.4;
  color: var(--text);
  margin-bottom: 5px;
}

.card.read .card-title { font-weight: 400; }

.card-snippet {
  font-size: 12.5px;
  color: var(--text2);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-thumb {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 6px;
  margin: 10px 0 12px;
  border: 1px solid var(--border);
}

.unread-indicator {
  position: absolute;
  left: 5px;
  top: 50%;
  transform: translateY(-50%);
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--unread-dot);
}

.kept-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  color: var(--kept);
  font-weight: 600;
  background: #edf7f1;
  padding: 1px 6px;
  border-radius: 10px;
  margin-top: 5px;
}

.no-articles {
  padding: 48px 24px;
  text-align: center;
  color: var(--muted);
}

.no-articles-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }
.no-articles p { font-size: 13px; line-height: 1.7; }
.reading-pane {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior-y: contain;   /* keep overscroll inside the pane (no iOS pull-to-refresh fighting the reader) */
  background: var(--surface);
  display: flex;
  flex-direction: column;
}

/* ── Layout toggle states (persisted in localStorage) ──────────────────────
   - Focus (v2.53) is a 3-STATE cycle (tap the Focus chip): level 0 = all panes,
     level 1 = body.focus-nav (hide left nav), level 2 = +body.focus-list (also
     hide the article/artifact list → reading pane only). Persisted as refinery.focusLevel.
   - body.compact-density → tighter padding/line-height for more cards on screen
   Active toggles get an .active class on the button via JS. */
body.focus-nav  aside          { display: none; }
body.focus-list .list-pane,
body.focus-list .artifact-list { display: none; }


/* Compact density — actual class names this time. Card class is `.card`,
   summary is `.card-snippet`, etc. The previous v2.12 rules targeted classes
   that don't exist (.article-card, .list-item, .article-summary). */
body.compact-density .nav-item        { padding: 3px 12px; font-size: 12.5px; }
body.compact-density .card            { padding: 10px 14px; }
body.compact-density .card-title      { font-size: 13.5px; line-height: 1.35; }
body.compact-density .card-snippet    { font-size: 11.5px; line-height: 1.4; }
body.compact-density .card-eyebrow    { font-size: 10px; }
body.compact-density .reading-content { padding: 14px 24px; }
body.compact-density .reading-title   { font-size: 22px; }
body.compact-density .reading-body    { font-size: 13.5px; line-height: 1.55; }

/* Per-card "open original" escape hatch — visible always, even when reading
   pane is hidden. Uses event.stopPropagation so it doesn't trigger card select. */
.card { position: relative; }
.card-open-link {
  position: absolute;
  top: 6px;
  right: 8px;
  text-decoration: none;
  color: var(--muted);
  font-size: 14px;
  line-height: 1;
  padding: 4px 7px;
  border-radius: 4px;
  z-index: 2;
  background: transparent;
}
.card-open-link:hover { color: var(--accent); background: var(--accent-soft); }

/* Font-size cycle (Aa chip): normal → large → xlarge → normal */
body.font-large  .card-title,
body.font-large  .reading-body p,
body.font-large  .reading-body          { font-size: 16px; line-height: 1.65; }
body.font-large  .card-snippet          { font-size: 14px; line-height: 1.55; }
body.font-large  .reading-title         { font-size: 26px; }
body.font-large  .nav-item              { font-size: 15px; }
body.font-large  .summary-prompt        { font-size: 14px; line-height: 1.55; }

body.font-xlarge .card-title,
body.font-xlarge .reading-body p,
body.font-xlarge .reading-body          { font-size: 18px; line-height: 1.7; }
body.font-xlarge .card-snippet          { font-size: 16px; line-height: 1.6; }
body.font-xlarge .reading-title         { font-size: 30px; }
body.font-xlarge .nav-item              { font-size: 16px; }
body.font-xlarge .summary-prompt        { font-size: 16px; line-height: 1.6; }

/* v2.51 — Inline executive-summary (Gemini), styled to the article-executive-summary
   skill look: editorial title, consulting callout cards, big bottom-line box. */
.exec-summary { padding: 8px 2px 48px; }
.exec-eyebrow { font: 600 11px/1.4 'DM Sans',sans-serif; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.exec-title { font-family: 'Lora',serif; font-size: 30px; line-height: 1.15; margin: 0 0 6px; color: var(--text,#1f1b16); }
.exec-theme { color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 22px; }
.exec-card { background: #fff; border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; padding: 14px 16px; margin-bottom: 14px; }
.exec-card-label { font: 600 11px/1.4 'DM Sans',sans-serif; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.exec-card p { margin: 0; font-size: 15px; line-height: 1.6; }
.exec-takeaways { margin: 6px 0 0; padding-left: 20px; }
.exec-takeaways li { font-size: 15px; line-height: 1.55; margin-bottom: 6px; }
.exec-bottom { background: var(--accent); color: #fff; border-radius: 10px; padding: 18px 20px; margin-top: 22px; }
.exec-bottom-label { font: 700 12px/1.4 'DM Sans',sans-serif; letter-spacing: 1.4px; margin-bottom: 8px; opacity: 0.92; }
.exec-bottom p { margin: 0; font-size: 17px; line-height: 1.5; font-weight: 500; }
.exec-summary-loading { padding: 40px 24px; color: var(--muted); font-size: 14px; }
body.font-large  .exec-card p, body.font-large  .exec-takeaways li { font-size: 16px; }
body.font-xlarge .exec-card p, body.font-xlarge .exec-takeaways li { font-size: 18px; }

.reading-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  color: var(--muted);
  text-align: center;
}

.reading-empty-icon { font-size: 40px; opacity: 0.25; margin-bottom: 4px; }
.reading-empty p { font-size: 13px; line-height: 1.8; max-width: 260px; }

.reading-content {
  padding: 36px 48px 80px;
  max-width: 760px;
}

.reading-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.reading-title {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 28px;
  line-height: 1.25;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: -0.3px;
}

.reading-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.tag {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 12px;
  border: 1px solid var(--border);
  color: var(--text2);
  background: var(--bg);
  font-weight: 500;
}

.tag.kept-tag { border-color: var(--kept); color: var(--kept); background: #edf7f1; }

.reading-divider { border: none; border-top: 1px solid var(--border); margin: 0 0 24px; }

.reading-body {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text2);
}

/* v2.37 — Full article HTML rendered when content_html exists (Ingestion v2.50+).
   Scoped to .article-html so external article styles don't bleed into the rest of the UI.
   Strips most inline color/background; preserves typography, links, images, lists, quotes. */
.reading-body.article-html { font-size: 15.5px; line-height: 1.7; color: var(--text); }
.reading-body.article-html p { margin: 0 0 1em; }
.reading-body.article-html h1,
.reading-body.article-html h2,
.reading-body.article-html h3 { font-family: var(--ff-display, 'Lora', Georgia, serif); font-weight: 600; line-height: 1.25; margin: 1.4em 0 0.4em; color: var(--text); }
.reading-body.article-html h1 { font-size: 22px; }
.reading-body.article-html h2 { font-size: 19px; }
.reading-body.article-html h3 { font-size: 17px; }
.reading-body.article-html a  { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
.reading-body.article-html a:hover { color: var(--accent-deep, var(--accent)); }
.reading-body.article-html img,
.reading-body.article-html video,
.reading-body.article-html figure { max-width: 100%; height: auto; display: block; margin: 1em auto; border-radius: 6px; }
.reading-body.article-html figcaption { font-size: 12.5px; color: var(--muted); text-align: center; margin-top: 0.4em; }
.reading-body.article-html ul,
.reading-body.article-html ol { margin: 0 0 1em; padding-left: 1.5em; }
.reading-body.article-html li { margin: 0.25em 0; }
.reading-body.article-html blockquote {
  margin: 1em 0; padding: 0.4em 1em; border-left: 3px solid var(--accent);
  color: var(--text2); font-style: italic;
}
.reading-body.article-html pre,
.reading-body.article-html code { font-family: ui-monospace, 'IBM Plex Mono', 'Menlo', monospace; font-size: 13px; }
.reading-body.article-html pre {
  background: var(--surface); border: 1px solid var(--border);
  padding: 12px 14px; border-radius: 6px; overflow-x: auto;
}
.reading-body.article-html hr { border: none; border-top: 1px solid var(--border); margin: 1.4em 0; }
/* v2.39 — Don't put borders on every cell. HTML emails (Substack, Mailchimp,
   etc.) use deeply-nested layout tables; default-bordering every cell turns
   their invisible layout into visible empty boxes. Borders only when the
   table explicitly asks via the border="1" attribute. width: auto so Substack's
   centered layout tables aren't stretched. */
.reading-body.article-html table { border-collapse: collapse; margin: 1em 0; max-width: 100%; }
.reading-body.article-html th,
.reading-body.article-html td { padding: 4px 8px; text-align: left; vertical-align: top; }
.reading-body.article-html table[border]:not([border="0"]) { border: 1px solid var(--border); }
.reading-body.article-html table[border]:not([border="0"]) th,
.reading-body.article-html table[border]:not([border="0"]) td { border: 1px solid var(--border); }
.reading-body.article-html [style*="color"],
.reading-body.article-html [style*="background"] { color: inherit !important; background: transparent !important; }

.reading-photo {
  width: 100%;
  max-height: 320px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--border);
  margin: 0 0 18px;
}

.reading-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 32px;
  flex-wrap: wrap;
}

.action-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.action-btn:hover { border-color: var(--border2); background: var(--bg); }

.action-btn.primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.action-btn.primary:hover { opacity: 0.88; }

.action-btn.keep-btn { color: var(--kept); border-color: #b8dfc8; }
.action-btn.keep-btn:hover { background: #edf7f1; }
.action-btn.keep-btn.active { background: var(--kept); color: white; border-color: var(--kept); }

.artifacts-view {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.artifact-list {
  width: var(--list-w);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  background: var(--surface);
}

.artifact-list-header {
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 5;
}

.artifact-list-title {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 2px;
}

.artifact-list-sub { font-size: 11px; color: var(--muted); }

.artifact-card {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.artifact-card:hover { background: #fafaf8; }
.artifact-card.selected { background: var(--accent-soft); }

/* v2.57 — Artifacts folder tree (collapsible groups) */
.artifact-folder { border-bottom: 1px solid var(--border); }
.artifact-folder-head {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; cursor: pointer; user-select: none;
  background: #faf7f1; font: 600 11px/1.3 'DM Sans', sans-serif;
  letter-spacing: 0.4px; color: var(--text2); text-transform: uppercase;
  position: sticky; top: 0; z-index: 1;
}
.artifact-folder-head:hover { color: var(--accent); }
.artifact-folder-caret { font-size: 10px; transition: transform 0.15s; }
.artifact-folder.collapsed .artifact-folder-caret { transform: rotate(-90deg); }
.artifact-folder-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.artifact-folder-count { color: var(--muted); font-weight: 500; }
.artifact-folder.collapsed .artifact-folder-items { display: none; }

/* v2.40 — .artifact-type-icon CSS removed alongside the HTML pill in showArtifactsView.
   File-type label was redundant (artifact list is HTML-dominant; type-icon added visual
   noise without information value). */

.artifact-info { flex: 1; min-width: 0; }

.artifact-name {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 3px;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.artifact-meta {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.artifact-viewer {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.artifact-viewer-header {
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

/* v2.52 — article-style eyebrow on the artifact header */
.artifact-viewer-eyebrow { font: 600 11px/1.4 'DM Sans',sans-serif; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; }

.artifact-viewer-head {
  width: 100%;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
}

.artifact-viewer-title {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 16px;
  line-height: 1.3;
  color: var(--text);
}

.artifact-viewer-meta {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.artifact-viewer-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.artifact-icon-btn {
  width: 32px;
  height: 32px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.artifact-icon-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}

.artifact-icon-btn.danger:hover {
  border-color: #c2410c;
  color: #c2410c;
  background: #fff2eb;
}

.artifact-viewer-frame {
  flex: 1;
  border: none;
  width: 100%;
  background: white;
}

/* v2.43 — .artifact-viewer-body removed alongside the iframe revert.
   Artifact HTML once again renders via iframe (.artifact-viewer-frame) so
   newsletter designs look the way their authors intended. */

.artifact-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;
  color: var(--muted);
}
.kb-bar {
  height: var(--kb-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  flex-shrink: 0;
}

.kb-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
}

kbd {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  color: var(--text2);
}
.loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  z-index: 100;
}

.loader-logo {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 28px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}

.loader-logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 18px;
}

.loader-track {
  width: 200px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.loader-bar {
  height: 100%;
  background: var(--accent);
  animation: sweep 1.5s ease-in-out infinite;
}

@keyframes sweep {
  0% { width:0%; margin-left:0 }
  50% { width:55%; margin-left:25% }
  100% { width:0%; margin-left:100% }
}

.loader-msg { font-size: 13px; color: var(--muted); }
.toast {
  position: fixed;
  bottom: 52px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: white;
  padding: 9px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.25s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted2); }
</style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="loader-logo">
    <div class="loader-logo-icon"></div>
    Refinery V2.57
  </div>
  <div class="loader-track"><div class="loader-bar"></div></div>
  <div class="loader-msg" id="loaderMsg">Loading your knowledge base</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- App -->
<div class="app" id="app" style="display:none">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      Refinery V2.57
    </div>
    <div class="search-box">
      <span class="search-icon"></span>
      <input type="text" id="searchInput" placeholder="Search articles and artifacts" oninput="handleSearchInput()"><button class="search-clear" id="searchClear" onclick="clearSearch()" aria-label="Clear search">x</button>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="live-dot" id="liveDot"></div>
        <span id="statusText"></span>
      </div>
      <!-- v2.48 — The separate NAV / LIST / READER toggles were folded into one
           "Focus" chip: it hides the left nav + middle list so the reading pane
           fills the screen, tap again to restore. Pairs with the horizontal
           swipe-through nav for full-screen reading on iPad. Then Unread filter
           and the Compact / Aa / Refresh utilities. -->
      <button class="chip" id="unreadChip"       onclick="toggleUnread()"   title="Unread — filter the list to unread articles only"><svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="6"/><circle cx="9" cy="9" r="2.6" fill="currentColor" stroke="none"/></svg></button>
      <button class="chip" id="toggleFocusBtn"   onclick="cycleFocus()"     title="Focus — tap to cycle: all panes → hide nav → reading only"><svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 2.5h-3a1 1 0 0 0-1 1v3M11.5 2.5h3a1 1 0 0 1 1 1v3M15.5 11.5v3a1 1 0 0 1-1 1h-3M6.5 15.5h-3a1 1 0 0 1-1-1v-3"/></svg></button>
      <button class="chip" id="toggleDensityBtn" onclick="toggleDensity()"  title="Compact — tighter density, more cards visible"><svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h12M3 8h12M3 11h12M3 14h12"/></svg></button>
      <button class="chip" id="toggleFontBtn"    onclick="cycleFontSize()"  title="Aa — cycle font size (normal / large / extra large)">Aa</button>
      <button class="chip"                       onclick="refreshAll()"     title="Refresh — reload articles"><svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 9a5.5 5.5 0 1 1-1.6-3.9"/><path d="M14.5 3.5V6h-2.5"/></svg></button>
    </div>
  </header>

  <!-- Body -->
  <div class="body-wrap">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-section">Inbox</div>
      <div class="nav-item active" id="nav-all" onclick="setView('all')">
        <span class="nav-icon"></span>
        <span class="nav-label">All Unread</span>
        <span class="nav-count" id="count-all">0</span>
      </div>
      <div class="nav-item" id="nav-kept" onclick="setView('kept')">
        <span class="nav-icon"></span>
        <span class="nav-label">Kept</span>
        <span class="nav-count zero" id="count-kept">0</span>
      </div>

      <hr class="sidebar-divider">
      <div class="sidebar-section">Categories</div>
      <div id="catNav"></div>

      <hr class="sidebar-divider">
      <div class="sidebar-section">Sources</div>
      <div id="sourceNav"></div>

      <hr class="sidebar-divider">
      <div class="nav-item" id="nav-artifacts" onclick="setView('artifacts')">
        <span class="nav-icon"></span>
        <span class="nav-label">Artifacts</span>
        <span class="nav-count zero" id="count-artifacts">0</span>
      </div>
    </aside>

    <!-- Main content area -->
    <div id="mainArea" style="display:flex; flex:1; overflow:hidden;">

      <!-- Article List -->
      <div class="list-pane" id="listPane">
        <div class="list-header">
          <div class="list-title" id="listTitle">All Unread</div>
          <div class="list-meta">
            <span id="listCount"></span>
            <button class="summarize-btn" onclick="summarizeVisible()">Summarize</button>
            <span style="color:var(--border2)"></span>
            <button class="mark-all-btn" onclick="markAllVisible()">Mark all read</button>
          </div>
        </div>
        <div id="articleList"></div>
      </div>

      <!-- Reading Pane -->
      <div class="reading-pane" id="readingPane">
        <div class="reading-empty" id="readingEmpty">
          <div class="reading-empty-icon"></div>
          <p>Select an article to read.<br>Use <kbd>N</kbd> and <kbd>P</kbd> to navigate.</p>
        </div>
        <div class="reading-content" id="readingContent" style="display:none"></div>
      </div>

    </div>

  </div>

  <!-- Keyboard shortcut bar -->
  <div class="kb-bar">
    <div class="kb-item"><kbd>N</kbd> Next / mark read</div>
    <div class="kb-item"><kbd>P</kbd> Prev / mark read</div>
    <div class="kb-item"><kbd>K</kbd> Keep</div>    <div class="kb-item"><kbd>Enter</kbd> Open URL</div>
    <div class="kb-item"><kbd>M</kbd> Toggle read</div>
  </div>

</div>

<script>
const WORKING_SET_SIZE = 1250;
const MORE_PAGE_SIZE = 250;
const ARTIFACT_LIMIT = 50;

let ARTICLES = [];
let ARTIFACTS = [];
let filtered = [];
let selectedId = null;
let selectedArtifact = null;
let view = 'all';
let unreadOnly = true;
let artView = false;
// Search always spans all loaded articles — the Current view / All loaded chips
// were removed in v2.13 as redundant with Unread filtering.
let searchScope = 'all';
let loadingMore = false;
let moreAvailable = 0;
let artifactTotal = 0;
let PRESERVED_READ_IDS = {};
let VIEWER_STATS = {
  totalArticles: 0,
  unreadArticles: 0,
  keptArticles: 0,
  deletedArticles: 0,
  artifactCount: 0,
  categoryCounts: {},
  sourceCounts: {}
};

// Final 10-category set (matches Ingestion v2.45). Anything not in here OR in
// CATEGORY_MAP gets folded to 'Tech' as the safe default.
const CATEGORY_KEYS = [
  'News', 'AI', 'Finance', 'Learning', 'Tech',
  'Watches', 'YouTube', 'Reddit', 'Email', 'Duplicate'
];

const CATEGORY_MAP = {
  // Current short names
  'news': 'News',
  'ai': 'AI',
  'finance': 'Finance',
  'learning': 'Learning',
  'tech': 'Tech',
  'watches': 'Watches',
  'youtube': 'YouTube',
  'reddit': 'Reddit',
  'email': 'Email',
  'duplicate': 'Duplicate',
  'duplicates': 'Duplicate',
  // Legacy long names (so unbackfilled rows still show in the right bucket)
  'top story': 'News',
  'top stories': 'News',
  'ai & llms': 'AI',
  'ai llms': 'AI',
  'tech & trends': 'Tech',
  'tech trends': 'Tech',
  'technology': 'Tech',
  'resources': 'Learning',
  'resource': 'Learning',
  'learning & skills': 'Learning',
  'learning skills': 'Learning',
  // Retired categories — fold into closest current
  'policy & society': 'News',
  'policy society': 'News',
  'policy': 'News',
  'dev tools': 'Tech',
  'research': 'Tech',
  'strategy': 'Learning',
  'framework': 'Learning',
  'insight': 'Learning',
  'quick hit': 'Tech',
  'general': 'Tech',
  'watch': 'Watches',
  'video': 'YouTube',
  'artifacts': 'Artifacts'
};

const CATEGORIES = [
  { key: 'News'      },
  { key: 'AI'        },
  { key: 'Finance'   },
  { key: 'Learning'  },
  { key: 'Tech'      },
  { key: 'Watches'   },
  { key: 'YouTube'   },
  { key: 'Reddit'    },
  { key: 'Email'     },
  { key: 'Duplicate' }
];

// v2.36 — Inline SVG icons per category. 18px monoline, currentColor.
// Pulled from the Claude Design v3 package (design/claude-design-v3/...).
// Renders in the iconized nav rail and at the start of each full-mode nav-item.
function catIcoSvg_(key) {
  var c = 'fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"';
  switch(key) {
    case 'News':      return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><rect x="3" y="4" width="11" height="12" rx="1"/><path d="M14 7h3v7.5a1.5 1.5 0 0 1-1.5 1.5h0a1.5 1.5 0 0 1-1.5-1.5V7"/><path d="M5.5 7.5h6M5.5 10h6M5.5 12.5h4"/></svg>';
    case 'AI':        return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><circle cx="10" cy="10" r="2"/><circle cx="4.5" cy="5.5" r="1"/><circle cx="15.5" cy="5.5" r="1"/><circle cx="4.5" cy="14.5" r="1"/><circle cx="15.5" cy="14.5" r="1"/><path d="M5.4 6.3l3 2.5M14.6 6.3l-3 2.5M5.4 13.7l3-2.5M14.6 13.7l-3-2.5"/></svg>';
    case 'Finance':   return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><path d="M3 15.5h14"/><path d="M5.5 15.5V11M9 15.5V8M12.5 15.5V5M16 15.5V9.5"/><path d="M3.5 6.5L6 5l3 3.5 3-3 4.5 1.5"/></svg>';
    case 'Learning':  return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><path d="M3.5 6L10 3l6.5 3-6.5 3-6.5-3z"/><path d="M6 7.5v3.5c0 1.4 1.8 2.5 4 2.5s4-1.1 4-2.5V7.5"/><path d="M16.5 6v4.5"/></svg>';
    case 'Tech':      return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><rect x="5" y="5" width="10" height="10" rx="1.2"/><rect x="7.5" y="7.5" width="5" height="5" rx="0.5"/><path d="M5 8h-2M5 12h-2M17 8h-2M17 12h-2M8 5V3M12 5V3M8 17v-2M12 17v-2"/></svg>';
    case 'Watches':   return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><circle cx="10" cy="10" r="5"/><path d="M10 7v3l2 1.5"/><path d="M7.5 5l-1-1.5h7l-1 1.5M7.5 15l-1 1.5h7l-1-1.5"/></svg>';
    case 'YouTube':   return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><rect x="2.5" y="5.5" width="15" height="9" rx="2"/><path d="M8.5 8.2v3.6l3-1.8z" fill="currentColor" stroke="none"/></svg>';
    case 'Reddit':    return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><circle cx="10" cy="11" r="6"/><circle cx="10" cy="3.5" r="1"/><path d="M10 4.5v3.5"/><circle cx="7.5" cy="11" r="0.7" fill="currentColor" stroke="none"/><circle cx="12.5" cy="11" r="0.7" fill="currentColor" stroke="none"/><path d="M7.5 13.5c1.5 1 3.5 1 5 0"/></svg>';
    case 'Email':     return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><rect x="2.5" y="5" width="15" height="10" rx="1.5"/><path d="M3 6l7 5 7-5"/></svg>';
    case 'Duplicate': return '<svg width="18" height="18" viewBox="0 0 20 20" '+c+'><rect x="3" y="3" width="9" height="9" rx="1"/><rect x="8" y="8" width="9" height="9" rx="1"/></svg>';
  }
  return '';
}

window.addEventListener('load', function() {
  updateUnreadChip();
  updateSearchScopeChips();
  updateSearchClear();
  loadBootstrap(false);
});

function loadBootstrap(showToast) {
  setStatus('loading', 'Refreshing');
  setLoaderMessage('Loading your knowledge base');
  return new Promise(function(resolve, reject) {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          reject(result.error);
          return;
        }

        ARTICLES = Array.isArray(result.articles) ? result.articles : [];
        ARTIFACTS = Array.isArray(result.artifacts) ? result.artifacts : [];
        artifactTotal = result.artifactTotal || ARTIFACTS.length;
        moreAvailable = result.moreAvailable || 0;
        VIEWER_STATS = normalizeStats(result.stats, artifactTotal);
        PRESERVED_READ_IDS = {};

        document.getElementById('loader').style.display = 'none';
        document.getElementById('app').style.display = 'flex';

        buildSidebar();
        if (view === 'artifacts') {
          showArtifactsView();
        } else {
          showArticlesView();
          applyFilters();
        }
        setStatus('connected', formatNumber(VIEWER_STATS.totalArticles) + ' total');
        if (showToast) toast('Refreshed');
        resolve();
      })
      .withFailureHandler(function(err) {
        reject(err && err.message ? err.message : String(err));
      })
      .getViewerBootstrap(WORKING_SET_SIZE, ARTIFACT_LIMIT);
  }).catch(function(err) {
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('loaderMsg').textContent = 'Startup error: ' + err;
    setStatus('error', 'Load failed');
  });
}

function normalizeStats(stats, artifactCount) {
  stats = stats || {};
  return {
    totalArticles: stats.totalArticles || 0,
    unreadArticles: stats.unreadArticles || 0,
    keptArticles: stats.keptArticles || 0,
    deletedArticles: stats.deletedArticles || 0,
    browseableArticles: stats.browseableArticles || 0,
    artifactCount: artifactCount || 0,
    categoryCounts: stats.categoryCounts || {},
    sourceCounts: stats.sourceCounts || {}
  };
}

function setLoaderMessage(text) {
  var el = document.getElementById('loaderMsg');
  if (el) el.textContent = text;
}

function refreshAll() {
  loadBootstrap(true);
}

function formatNumber(value) {
  return Number(value || 0).toLocaleString('en-US');
}

function setStatus(type, text) {
  var dot = document.getElementById('liveDot');
  if (dot) {
    dot.className = 'live-dot' + (type === 'connected' ? ' connected' : type === 'error' ? ' error' : '');
  }
  var label = document.getElementById('statusText');
  if (label) label.textContent = text;
}

function buildSidebar() {
  setCount('count-all', VIEWER_STATS.unreadArticles);
  setCount('count-kept', VIEWER_STATS.keptArticles);
  setCount('count-archive', VIEWER_STATS.deletedArticles);
  setCount('count-artifacts', VIEWER_STATS.artifactCount);

  document.getElementById('catNav').innerHTML = CATEGORIES.map(function(cat) {
    var cnt = VIEWER_STATS.categoryCounts[cat.key] || 0;
    return `
      <div class="nav-item ${view === 'cat:' + cat.key ? 'active' : ''}" onclick="setView('cat:${cat.key}')">
        <span class="nav-icon">${catIcoSvg_(cat.key)}</span>
        <span class="nav-label">${cat.key}</span>
        ${cnt > 0 ? `<span class="nav-count">${cnt}</span>` : `<span class="nav-count zero">0</span>`}
      </div>`;
  }).join('');

  var sources = Object.keys(VIEWER_STATS.sourceCounts).sort(function(a, b) {
    return (VIEWER_STATS.sourceCounts[b] || 0) - (VIEWER_STATS.sourceCounts[a] || 0);
  });

  document.getElementById('sourceNav').innerHTML = sources.map(function(src) {
    var cnt = VIEWER_STATS.sourceCounts[src] || 0;
    return `
      <div class="nav-item ${view === 'src:' + src ? 'active' : ''}" onclick="setView('src:${esc(src)}')">
        <span class="nav-icon">${(src && src.charAt(0) || '').toUpperCase()}</span>
        <span class="nav-label">${src}</span>
        ${cnt > 0 ? `<span class="nav-count">${cnt}</span>` : `<span class="nav-count zero">0</span>`}
      </div>`;
  }).join('');

  updateUnreadChip();
}

function setCount(id, n) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = n;
  el.className = 'nav-count' + (n === 0 ? ' zero' : '');
}

function setView(v) {
  view = v;
  artView = v === 'artifacts';
  searchScope = 'all';
  PRESERVED_READ_IDS = {};

  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.remove('active');
  });

  var navMap = {
    all: 'nav-all',
    kept: 'nav-kept',
    archive: 'nav-archive',
    artifacts: 'nav-artifacts'
  };
  if (navMap[v]) {
    var nav = document.getElementById(navMap[v]);
    if (nav) nav.classList.add('active');
  }

  if (artView) {
    showArtifactsView();
  } else {
    showArticlesView();
    applyFilters();
  }
}

function showArticlesView() {

    <div class="list-pane" id="listPane">

          <button class="summarize-btn" onclick="summarizeVisible()">Summarize</button>

      </div>

}

function showArtifactsView() {
  var main = document.getElementById('mainArea');
  var items = filteredArtifacts_();
  main.innerHTML = `
    <div class="artifacts-view" style="flex:1;overflow:hidden;display:flex;">
      <div class="artifact-list" id="artifactList">

  if (!ARTIFACTS.length) {
